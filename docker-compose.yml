services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exposebrief-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: exposebrief-dashboard
    ports:
      - "8501:8501"
    environment:
      - EXPOSEBRIEF_API=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
